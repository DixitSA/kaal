<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Heritage Timer - Kaal</title>
<!-- Google Fonts: Noto Serif for headlines, Manrope for labels -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-surface": "#1c1c17",
                  "on-primary-fixed-variant": "#7e2c0a",
                  "on-background": "#1c1c17",
                  "inverse-primary": "#ffb59b",
                  "on-secondary-container": "#785c2d",
                  "surface-container-lowest": "#ffffff",
                  "primary-fixed-dim": "#ffb59b",
                  "tertiary-fixed-dim": "#cdc5c0",
                  "tertiary-fixed": "#e9e1dc",
                  "on-error-container": "#93000a",
                  "error-container": "#ffdad6",
                  "outline": "#89726b",
                  "surface-tint": "#9d4320",
                  "on-secondary-fixed": "#281900",
                  "on-secondary": "#ffffff",
                  "surface-container-low": "#f6f3eb",
                  "error": "#ba1a1a",
                  "inverse-on-surface": "#f3f1e9",
                  "background": "#fcf9f1",
                  "tertiary": "#605b57",
                  "surface-dim": "#dcdad2",
                  "on-tertiary-container": "#fffbff",
                  "outline-variant": "#dcc1b8",
                  "surface": "#fcf9f1",
                  "on-tertiary-fixed-variant": "#4b4642",
                  "on-secondary-fixed-variant": "#5b4215",
                  "tertiary-container": "#79736f",
                  "surface-variant": "#e5e2da",
                  "surface-container-highest": "#e5e2da",
                  "secondary-fixed-dim": "#e6c188",
                  "on-surface-variant": "#56423c",
                  "secondary-fixed": "#ffdeac",
                  "surface-container-high": "#ebe8e0",
                  "on-primary": "#ffffff",
                  "secondary": "#755a2b",
                  "secondary-container": "#fdd79c",
                  "on-tertiary-fixed": "#1e1b18",
                  "surface-bright": "#fcf9f1",
                  "primary": "#9a401e",
                  "on-error": "#ffffff",
                  "on-primary-fixed": "#380d00",
                  "surface-container": "#f1eee6",
                  "on-tertiary": "#ffffff",
                  "primary-container": "#b95833",
                  "primary-fixed": "#ffdbcf",
                  "on-primary-container": "#fffbff",
                  "inverse-surface": "#31312b"
          },
          "borderRadius": {
                  "DEFAULT": "0.125rem",
                  "lg": "0.25rem",
                  "xl": "0.5rem",
                  "full": "0.75rem"
          },
          "fontFamily": {
                  "headline": ["Noto Serif"],
                  "body": ["Manrope"],
                  "label": ["Manrope"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    
    /* Gentle text sequence fade logic (simulated for UI) */
    .fade-sequence-item {
      opacity: 0;
      position: absolute;
      width: 100%;
      top: 0;
      left: 0;
      transition: opacity 1000ms ease-in-out;
    }

    .fade-sequence-item.active {
      opacity: 1;
      position: relative;
    }

    /* Slow filling progress bar */
    .progress-bar-fill {
      width: 0%;
      transition: width 5000ms linear;
    }

    /* Initial state trigger after load */
    .loading-active .progress-bar-fill {
      width: 100%;
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body m-0 p-0 flex flex-col min-h-screen">
<!-- Shell Visibility & Relevance: No Nav Bar or FAB on focused Loading Screen -->
<main class="flex-grow flex items-center justify-center">
<div class="max-w-md w-full px-8 flex flex-col items-center">
<!-- Kaal Wordmark -->
<h1 class="font-headline text-4xl md:text-5xl font-semibold text-on-surface tracking-tight mb-8">
        Kaal
      </h1>
<!-- Rotating Text Sequence -->
<div class="relative w-full h-8 text-center mb-6">
<!-- Sequence logic: only one visible at a time. Using classes to simulate "reading your current phase..." state -->
<p class="fade-sequence-item text-on-surface-variant font-headline italic text-lg md:text-xl">
          mapping your pattern…
        </p>
<p class="fade-sequence-item active text-on-surface-variant font-headline italic text-lg md:text-xl">
          reading your current phase…
        </p>
<p class="fade-sequence-item text-on-surface-variant font-headline italic text-lg md:text-xl">
          calculating today's signal…
        </p>
</div>
<!-- Hairline Progress Bar -->
<div class="w-24 md:w-32 h-[1px] bg-outline-variant/30 overflow-hidden">
<!-- Progress fill in primary Saffron -->
<div class="h-full bg-primary progress-bar-fill" style="width: 45%;"></div>
</div>
</div>
</main>
<!-- Image suppression for minimal screen - no background patterns or decor -->
</body></html>
