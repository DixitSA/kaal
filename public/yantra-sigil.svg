<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none">
  <!-- Outer square with gate notches (bhupura) -->
  <rect x="8" y="8" width="184" height="184" stroke="#2C2C2C" stroke-width="1.2" fill="none"/>
  <rect x="14" y="14" width="172" height="172" stroke="#2C2C2C" stroke-width="0.5" fill="none"/>

  <!-- Gate notches — top -->
  <line x1="86" y1="8" x2="86" y2="14" stroke="#2C2C2C" stroke-width="1.2"/>
  <line x1="114" y1="8" x2="114" y2="14" stroke="#2C2C2C" stroke-width="1.2"/>
  <!-- Gate notches — bottom -->
  <line x1="86" y1="186" x2="86" y2="192" stroke="#2C2C2C" stroke-width="1.2"/>
  <line x1="114" y1="186" x2="114" y2="192" stroke="#2C2C2C" stroke-width="1.2"/>
  <!-- Gate notches — left -->
  <line x1="8" y1="86" x2="14" y2="86" stroke="#2C2C2C" stroke-width="1.2"/>
  <line x1="8" y1="114" x2="14" y2="114" stroke="#2C2C2C" stroke-width="1.2"/>
  <!-- Gate notches — right -->
  <line x1="186" y1="86" x2="192" y2="86" stroke="#2C2C2C" stroke-width="1.2"/>
  <line x1="186" y1="114" x2="192" y2="114" stroke="#2C2C2C" stroke-width="1.2"/>

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="76" stroke="#2C2C2C" stroke-width="0.8" fill="none"/>

  <!-- 8-petal lotus ring -->
  <g stroke="#2C2C2C" stroke-width="0.7" fill="none">
    <!-- Petals pointing outward at 8 cardinal/diagonal directions -->
    <ellipse cx="100" cy="68" rx="7" ry="13" transform="rotate(0 100 100)"/>
    <ellipse cx="100" cy="68" rx="7" ry="13" transform="rotate(45 100 100)"/>
    <ellipse cx="100" cy="68" rx="7" ry="13" transform="rotate(90 100 100)"/>
    <ellipse cx="100" cy="68" rx="7" ry="13" transform="rotate(135 100 100)"/>
    <ellipse cx="100" cy="68" rx="7" ry="13" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="68" rx="7" ry="13" transform="rotate(225 100 100)"/>
    <ellipse cx="100" cy="68" rx="7" ry="13" transform="rotate(270 100 100)"/>
    <ellipse cx="100" cy="68" rx="7" ry="13" transform="rotate(315 100 100)"/>
  </g>

  <!-- Inner circle (cuts lotus base) -->
  <circle cx="100" cy="100" r="54" stroke="#2C2C2C" stroke-width="0.8" fill="#F5F2E9"/>

  <!-- Downward triangle (Shakti) — large -->
  <polygon
    points="100,44 148,130 52,130"
    stroke="#2C2C2C" stroke-width="1.1" fill="none"
  />

  <!-- Upward triangle (Shiva) — large -->
  <polygon
    points="100,156 52,70 148,70"
    stroke="#2C2C2C" stroke-width="1.1" fill="none"
  />

  <!-- Downward triangle — medium -->
  <polygon
    points="100,58 138,120 62,120"
    stroke="#2C2C2C" stroke-width="0.7" fill="none"
  />

  <!-- Upward triangle — medium -->
  <polygon
    points="100,142 62,80 138,80"
    stroke="#2C2C2C" stroke-width="0.7" fill="none"
  />

  <!-- Downward triangle — small -->
  <polygon
    points="100,72 126,114 74,114"
    stroke="#2C2C2C" stroke-width="0.6" fill="none"
  />

  <!-- Upward triangle — small -->
  <polygon
    points="100,128 74,86 126,86"
    stroke="#2C2C2C" stroke-width="0.6" fill="none"
  />

  <!-- Inner circle -->
  <circle cx="100" cy="100" r="14" stroke="#2C2C2C" stroke-width="0.7" fill="none"/>

  <!-- Bindu — central point -->
  <circle cx="100" cy="100" r="2.5" fill="#2C2C2C"/>
</svg>
